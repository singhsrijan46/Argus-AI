steps:
  # ── Build backend image ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/argus-ai/argus-backend:latest'
      - '-f'
      - 'backend.Dockerfile'
      - '.'

  # ── Build dashboard image ──
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-south1-docker.pkg.dev/$PROJECT_ID/argus-ai/argus-dashboard:latest'
      - '--build-arg'
      - 'NEXT_PUBLIC_API_URL=https://argus-backend-192403939373.asia-south1.run.app'
      - '-f'
      - 'dashboard/Dockerfile'
      - './dashboard'

images:
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/argus-ai/argus-backend:latest'
  - 'asia-south1-docker.pkg.dev/$PROJECT_ID/argus-ai/argus-dashboard:latest'

timeout: '1800s'
options:
  machineType: 'E2_HIGHCPU_8'
