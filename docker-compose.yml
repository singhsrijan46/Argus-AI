# ─────────────────────────────────────────────────────────────
#  Argus AI — Docker Compose
#  Orchestrates: Backend API (FastAPI) + Dashboard (Next.js)
# ─────────────────────────────────────────────────────────────

services:
  # ── FastAPI Backend (ML Scoring API) ──────────────────────
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: argus-backend
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DEVICE=${DEVICE:-cpu}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount data & models for live updates without rebuilding
      - ./data:/app/data
      - ./models:/app/models
      - ./results:/app/results
    restart: unless-stopped
    networks:
      - argus-net

  # ── Next.js Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: argus-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - argus-net

networks:
  argus-net:
    driver: bridge
